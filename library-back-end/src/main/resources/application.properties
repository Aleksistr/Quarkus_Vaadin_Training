# H2 file-based DB (persistent)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:/data/h2db/mydb
# quarkus.datasource.jdbc.url=jdbc:h2:mem:mydb
quarkus.datasource.username=admin
quarkus.datasource.password=admin
%dev.quarkus.datasource.h2.console.enabled=true
%dev.quarkus.datasource.h2.console.path=/h2
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql